log_level=3
xlog_level=3

mpath="/usr/lib/x86_64-linux-gnu/opensips/modules/"

socket=udp:172.25.57.39:5060

loadmodule "proto_udp.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "sipmsgops.so"
loadmodule "textops.so"
loadmodule "usrloc.so"
loadmodule "signaling.so"
loadmodule "registrar.so"
loadmodule "rest_client.so"

modparam("usrloc", "working_mode_preset", "single-instance-no-db")

route {

    xlog("L_INFO", "[$rm] from $fu to $ru\n");

    if (!mf_process_maxfwd_header(10)) {
        sl_send_reply(483, "Too Many Hops");
        exit;
    }

    if (is_method("REGISTER")) {

        if (!save("location")) {
            xlog("L_ERR", "REGISTER save failed for $fu\n");
            sl_reply_error();
        } else {
            xlog("L_INFO", "REGISTER saved for $fu\n");
        }

        exit;
    }

    if (is_method("INVITE")) {

        xlog("L_INFO", "INVITE received: $fu -> $ru\n");

        rest_get("http://127.0.0.1:8080/decision?caller=$fU", $avp(trustcall_decision));

        xlog("L_INFO", "TrustCall decision for $fU: $avp(trustcall_decision)\n");

        if ($avp(trustcall_decision) == "BLOCK") {
            xlog("L_WARN", "TrustCall blocked caller $fU\n");
            sl_send_reply(603, "Call Blocked by TrustCall");
            exit;
        }
    }

    if (!lookup("location")) {

        xlog("L_WARN", "User not found: $ru\n");

        sl_send_reply(404, "User Not Found");

        exit;
    }

    if (!t_relay()) {
        sl_reply_error();
    }
}
